<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5c7cfa"/>
      <stop offset="100%" style="stop-color:#748ffc"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4c6ef5"/>
      <stop offset="50%" style="stop-color:#5c7cfa"/>
      <stop offset="100%" style="stop-color:#91a7ff"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>
  
  <!-- Circuit pattern background -->
  <g opacity="0.15">
    <circle cx="50" cy="50" r="3" fill="#5c7cfa"/>
    <circle cx="100" cy="80" r="2" fill="#5c7cfa"/>
    <circle cx="350" cy="60" r="3" fill="#5c7cfa"/>
    <circle cx="300" cy="100" r="2" fill="#5c7cfa"/>
    <circle cx="60" cy="340" r="3" fill="#5c7cfa"/>
    <circle cx="340" cy="350" r="2" fill="#5c7cfa"/>
    <line x1="50" y1="50" x2="100" y2="80" stroke="#5c7cfa" stroke-width="1"/>
    <line x1="350" y1="60" x2="300" y2="100" stroke="#5c7cfa" stroke-width="1"/>
    <line x1="60" y1="340" x2="340" y2="350" stroke="#5c7cfa" stroke-width="1" stroke-dasharray="5,10"/>
  </g>
  
  <!-- Geometric K letter -->
  <g transform="translate(200, 200)">
    <!-- Outer hexagon frame -->
    <polygon points="0,-140 121,-70 121,70 0,140 -121,70 -121,-70" 
             fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.6"/>
    
    <!-- Inner geometric K -->
    <g fill="url(#glow)">
      <!-- K vertical bar -->
      <rect x="-50" y="-100" width="25" height="200" rx="3"/>
      
      <!-- K top diagonal -->
      <polygon points="-25,-80 60,-100 75,-75 -10,-55"/>
      
      <!-- K bottom diagonal -->
      <polygon points="-25,80 75,100 60,75 -10,55"/>
    </g>
    
    <!-- Accent dots -->
    <circle cx="80" cy="-87" r="8" fill="#91a7ff"/>
    <circle cx="80" cy="87" r="8" fill="#91a7ff"/>
    <circle cx="-37" cy="-100" r="6" fill="#5c7cfa"/>
    <circle cx="-37" cy="100" r="6" fill="#5c7cfa"/>
    
    <!-- Neural network nodes -->
    <g fill="url(#accent)" opacity="0.8">
      <circle cx="-80" cy="-40" r="5"/>
      <circle cx="-80" cy="40" r="5"/>
      <circle cx="30" cy="0" r="4"/>
      <line x1="-80" y1="-40" x2="-25" y2="-60" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
      <line x1="-80" y1="40" x2="-25" y2="60" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
      <line x1="30" y1="0" x2="60" y2="-75" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
      <line x1="30" y1="0" x2="60" y2="75" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
    </g>
  </g>
  
  <!-- Corner decorations -->
  <g stroke="url(#accent)" stroke-width="2" fill="none" opacity="0.4">
    <path d="M 20,20 L 20,60 M 20,20 L 60,20"/>
    <path d="M 380,20 L 380,60 M 380,20 L 340,20"/>
    <path d="M 20,380 L 20,340 M 20,380 L 60,380"/>
    <path d="M 380,380 L 380,340 M 380,380 L 340,380"/>
  </g>
  
  <!-- Subtle grid -->
  <g stroke="#5c7cfa" stroke-width="0.5" opacity="0.1">
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
  </g>
</svg>